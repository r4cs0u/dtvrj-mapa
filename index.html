<style>
  :root {
    --font-body: 'Inter', system-ui, sans-serif;

    --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;

    --color-primary: #4f98a3; --color-primary-light: rgba(79,152,163,0.15); --color-primary-glow: rgba(79,152,163,0.3);

  .logo-icon { width: 28px; height: 28px; color: var(--color-primary); }

  .theme-btn:hover { color: var(--color-text); background: var(--color-surface-3); }
  .app-body { display: flex; flex: 1; overflow: hidden; }
  aside { width: var(--sidebar-w); flex-shrink: 0; background: var(--color-surface); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; z-index: 100; }
  .sidebar-header { padding: var(--space-4); border-bottom: 1px solid var(--color-border); position: sticky; top: 0; background: var(--color-surface); z-index: 10; }
  .sidebar-title { font-size: var(--text-xs); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); margin-bottom: var(--space-3); }
  .master-controls { display: flex; gap: var(--space-2); }
  .btn-xs { font-size: var(--text-xs); padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-surface-2); color: var(--color-text-muted); cursor: pointer; transition: color var(--transition), background var(--transition), border-color var(--transition); }
  .btn-xs:hover { background: var(--color-surface-3); color: var(--color-text); border-color: var(--color-primary); }
  .layer-group { padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--color-border); }
  .group-header { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); cursor: pointer; user-select: none; }
  .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .group-toggle-all { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .group-toggle-all input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; border-radius: 10px; background: var(--color-surface-3); border: 1px solid var(--color-border); cursor: pointer; transition: background var(--transition), border-color var(--transition); }
  .toggle-track::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--color-text-muted); transition: transform var(--transition), background var(--transition); }
  .group-toggle-all input:checked + .toggle-track { background: var(--color-primary); border-color: var(--color-primary); }
  .group-toggle-all input:checked + .toggle-track::after { transform: translateX(16px); background: #fff; }
  .layer-items { display: flex; flex-direction: column; gap: 2px; }
  .layer-item { display: flex; align-items: center; gap: var(--space-2); padding: 5px var(--space-2); border-radius: var(--radius-sm); transition: background var(--transition); }
  .layer-item:hover { background: var(--color-surface-2); }
  .layer-item input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--color-primary); cursor: pointer; flex-shrink: 0; }
  .layer-color-swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .layer-name { font-size: var(--text-xs); color: var(--color-text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .layer-item input[type=checkbox]:checked ~ .layer-name { color: var(--color-text); }
  .layer-opacity-row { display: flex; align-items: center; gap: var(--space-2); padding: 2px var(--space-2) 6px calc(var(--space-2) + 14px + var(--space-2) + 10px + var(--space-2)); opacity: 0.4; pointer-events: none; transition: opacity var(--transition); }
  .layer-opacity-row.active { opacity: 1; pointer-events: auto; }
  .opacity-slider { flex: 1; -webkit-appearance: none; appearance: none; height: 3px; border-radius: 2px; background: var(--color-surface-3); outline: none; cursor: pointer; }
  .opacity-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--color-primary); cursor: pointer; border: 2px solid var(--color-surface); box-shadow: 0 0 0 1px var(--color-primary); }

  .opacity-label { font-size: 10px; font-family: 'SF Mono','Consolas',monospace; color: var(--color-text-faint); min-width: 28px; text-align: right; }

  .leaflet-popup-content-wrapper { background: var(--color-surface-2) !important; color: var(--color-text) !important; border: 1px solid var(--color-border) !important; border-radius: var(--radius-md) !important; box-shadow: var(--shadow-lg) !important; padding: 0 !important; }

  .legend { position: absolute; bottom: var(--space-4); right: var(--space-4); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-3) var(--space-4); z-index: 500; box-shadow: var(--shadow-md); min-width: 160px; }

// Converte qualquer URL do Google Drive para o endpoint de thumbnail embed
function driveImgUrl(url) {
  if (!url) return '';
  // formato: drive.google.com/uc?id=ID  ou  /file/d/ID/
  let id = null;
  const m1 = url.match(/[?&]id=([^&]+)/);
  if (m1) id = m1[1];
  const m2 = url.match(/\/file\/d\/([^/?]+)/);
  if (!id && m2) id = m2[1];
  if (id) return `https://drive.google.com/thumbnail?id=${id}&sz=w600`;
  return url; // URL já é direta, usa como está
}

  return L.divIcon({
    className:'',
    html:`<svg width="24" height="32" viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 20 12 20S24 21 24 12C24 5.373 18.627 0 12 0z" fill="${color}" opacity="0.9"/>
      <circle cx="12" cy="12" r="5" fill="white" opacity="0.9"/>
      <circle cx="12" cy="12" r="3" fill="${color}"/></svg>`,
    iconSize:[24,32], iconAnchor:[12,32], popupAnchor:[0,-32]
  });
}

async function fetchSheetData() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.slice(text.indexOf('(') + 1, text.lastIndexOf(')')));
    const cols = json.table.cols.map(c => c.label);
    const rows = json.table.rows || [];
    const data = {};
    rows.forEach(row => {
      if (!row || !row.c) return;
      const obj = {};
      cols.forEach((col, i) => { obj[col] = row.c[i] ? row.c[i].v : ''; });
      const key = String(obj[cols[0]] || '').trim().toLowerCase();
      if (key) data[key] = obj;
    });
    console.log('[Sheet] OK:', Object.keys(data).length, 'linhas |', Object.keys(data).join(', '));
    return data;
  } catch(e) {
    console.warn('[Sheet] Falha:', e);
    return {};
  }
}

function fmtNum(v) {
  const n = parseFloat(String(v).replace(/[^0-9.]/g,''));
  return isNaN(n) ? (v || '—') : n.toLocaleString('pt-BR');
}

function buildSitePopup(s, row) {
  const tipo      = row?.Tipo          || '—';
  const popBest   = row?.Pop_BestServ   ? fmtNum(row.Pop_BestServ)   : '—';
  const popSingle = row?.Pop_SingleServ ? fmtNum(row.Pop_SingleServ) : '—';
  const fotoRaw   = row?.Foto || '';
  const foto      = driveImgUrl(fotoRaw);
  const fotoHTML  = foto
    ? `<img src="${foto}" alt="${s.name}" onerror="this.parentElement.innerHTML='<span class=sp-photo-placeholder>Foto indisponível</span>'">`
    : `<span class="sp-photo-placeholder">Sem foto cadastrada</span>`;
  return `<div class="site-popup">
    <div class="sp-header">
      <div><div class="sp-name">${s.name}</div><div class="sp-power">${s.potencia}</div></div>
      <span class="sp-tipo">Tipo: ${tipo}</span>
    </div>
    <div class="sp-photo">${fotoHTML}</div>
    <div class="sp-footer">
      <div class="sp-pop"><strong>Pop Best Server:</strong> ${popBest}</div>
      <div class="sp-pop"><strong>Pop Single Server:</strong> ${popSingle}</div>
    </div>
  </div>`;
}

const BASE_URL = 'https://r4cs0u.github.io/dtvrj-mapa/imagens/';
function makeOverlay(data, group){
  const isBest=!!data.isBestServer, fillColor=group==='rj'?'#3b82f6':'#f97316', defOpacity=isBest?0.80:0.70;
  opacityMap[data.id]=defOpacity;
  const img=L.imageOverlay(BASE_URL+data.file,data.bounds,{opacity:defOpacity,interactive:true});
  img.on('error',function(){
    const rect=L.rectangle(data.bounds,{color:fillColor,weight:isBest?2.5:1.5,opacity:isBest?0.85:0.55,fillColor:fillColor,fillOpacity:isBest?0.18:0.10,dashArray:isBest?null:'4 4'});
    img.off(); img.remove(); layerMap[data.id]=rect;
  });
  const tl=group==='rj'?'Cobertura RJ':'Cobertura DR', tc=group==='rj'?'rj':'dr';
  img.bindPopup(`<div style="padding:10px 12px"><div style="font-weight:700;font-size:14px;color:var(--color-text);margin-bottom:6px">${data.name}</div><span class="popup-type ${tc}">${tl}</span>${isBest?'<div style="margin-top:6px;font-size:11px;color:var(--color-primary)">▲ Best Serving Network</div>':''}</div>`);
  img.on('click',()=>showInfo(`<strong>${data.name}</strong><br><span style="font-size:10px;color:var(--color-text-muted)">${tl}</span>`));
  layerMap[data.id]=img; groupLayers[group].push(data.id);
}
COBERTURAS_RJ.forEach(d=>makeOverlay(d,'rj'));
COBERTURAS_DR.forEach(d=>makeOverlay(d,'dr'));

function setLayerOpacity(id,value){
  const pct=parseInt(value); opacityMap[id]=pct/100;
  const layer=layerMap[id]; if(!layer)return;
  if(layer.setOpacity)layer.setOpacity(pct/100);
  if(layer.setStyle)layer.setStyle({fillOpacity:pct/100,opacity:Math.min(1,pct/100+0.2)});
  const lbl=document.getElementById(`opacity-lbl-${id}`); if(lbl)lbl.textContent=pct+'%';
}

function buildSidebarGroup(containerId,dataArr,groupKey,color,defaultChecked=true,hasOpacity=false){
  const container=document.getElementById(containerId);
  dataArr.forEach(d=>{
    const wrapper=document.createElement('div');
    const item=document.createElement('div'); item.className='layer-item';
    item.innerHTML=`<input type="checkbox" id="layer-${d.id}" ${defaultChecked?'checked':''} onchange="toggleLayer('${d.id}',this.checked,'${groupKey}')">
      <div class="layer-color-swatch" style="background:${color};${d.isBestServer?'box-shadow:0 0 4px '+color:''}"></div>
      <label class="layer-name" for="layer-${d.id}" title="${d.name}">${d.name}</label>`;
    wrapper.appendChild(item);
    if(hasOpacity){
      const defPct=Math.round((opacityMap[d.id]??0.70)*100);
      const opRow=document.createElement('div');
      opRow.className='layer-opacity-row'+(defaultChecked?' active':''); opRow.id=`opacity-row-${d.id}`;
      opRow.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;color:var(--color-text-faint)"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18" opacity=".4"/></svg>
        <input type="range" class="opacity-slider" id="opacity-${d.id}" min="0" max="100" value="${defPct}" step="5" oninput="setLayerOpacity('${d.id}',this.value)">
        <span class="opacity-label" id="opacity-lbl-${d.id}">${defPct}%</span>`;
      wrapper.appendChild(opRow);
      item.querySelector('input[type=checkbox]').addEventListener('change',function(){opRow.classList.toggle('active',this.checked);});
    }
    container.appendChild(wrapper);
  });
}
buildSidebarGroup('items-rj',COBERTURAS_RJ,'rj','#3b82f6',false,true);
buildSidebarGroup('items-dr',COBERTURAS_DR,'dr','#f97316',false,true);

function toggleLayer(id,visible,group){const layer=layerMap[id];if(!layer)return;if(visible){layer.addTo(map);}else{map.removeLayer(layer);}updateGroupToggle(group);}
function toggleGroup(group,visible){groupLayers[group].forEach(id=>{const layer=layerMap[id];const cb=document.getElementById(`layer-${id}`);const row=document.getElementById(`opacity-row-${id}`);if(!layer)return;if(visible){layer.addTo(map);}else{map.removeLayer(layer);}if(cb)cb.checked=visible;if(row)row.classList.toggle('active',visible);});}
function toggleGroupAll(group){const m=document.getElementById(`toggle-group-${group}`);const s=!m.checked;m.checked=s;toggleGroup(group,s);}
function updateGroupToggle(group){const all=groupLayers[group].every(id=>{const cb=document.getElementById(`layer-${id}`);return cb&&cb.checked;});const m=document.getElementById(`toggle-group-${group}`);if(m)m.checked=all;}
function toggleAll(visible){['sites','rj','dr'].forEach(g=>{const m=document.getElementById(`toggle-group-${g}`);if(m)m.checked=visible;toggleGroup(g,visible);});}

(function(){
  const btn=document.querySelector('[data-theme-toggle]'),root=document.documentElement;
  function setTheme(dark){
    isDark=dark; root.setAttribute('data-theme',dark?'dark':'light');
    if(dark){map.removeLayer(tileLight);tileDark.addTo(map);}else{map.removeLayer(tileDark);tileLight.addTo(map);}
    btn.innerHTML=dark
      ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
      :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  }
  setTheme(false);
  btn.addEventListener('click',()=>setTheme(!isDark));
})();

const sidebar=document.getElementById('sidebar'),toggleBtn=document.getElementById('sidebarToggle');
let sidebarOpen=false;
toggleBtn.addEventListener('click',()=>{
  sidebarOpen=!sidebarOpen;
  sidebar.classList.toggle('open',sidebarOpen);
  toggleBtn.style.left=sidebarOpen?getComputedStyle(document.documentElement).getPropertyValue('--sidebar-w').trim():'0';
  toggleBtn.innerHTML=sidebarOpen
    ?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>'
    :'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>';
});
document.getElementById('map').style.position='relative';
const legend=document.getElementById('mapLegend');
document.querySelector('.app-body').appendChild(legend);
Object.assign(legend.style,{position:'absolute',bottom:'16px',right:'16px',zIndex:'500'});

(async function init(){
  const sheetData = await fetchSheetData();
  SITES.forEach(s => {
    const key = s.sheetKey.toLowerCase();
    const row = sheetData[key] || null;
    if (!row) console.warn(`[Sheet] Sem match: "${s.name}" (chave: "${key}")`);
    const m = L.marker([s.lat, s.lng], {icon: siteIcon('#ef4444')});
    m.bindPopup(buildSitePopup(s, row), {maxWidth: 260});
    m.on('click', () => showInfo(`<strong>${s.name}</strong><div class="info-coords">Lat: ${s.lat.toFixed(5)}<br>Lng: ${s.lng.toFixed(5)}</div>`));
    m.addTo(map); layerMap[s.id]=m; groupLayers.sites.push(s.id);
  });
  buildSidebarGroup('items-sites', SITES, 'sites', '#ef4444', true, false);
})();
</script>
